name: ECS Service Deploy (Reusable)

on:
  workflow_call:
    inputs:
      image-uri:
        description: Full ECR image URI to deploy
        type: string
        required: true
      task-family:
        description: ECS task definition family name
        type: string
        required: true
      cluster:
        description: ECS cluster name
        type: string
        required: true
      service:
        description: ECS service name
        type: string
        required: true
      container-name:
        description: Container name in task definition to update
        type: string
        required: true
      aws-region:
        description: AWS region
        type: string
        required: false
        default: us-east-2
    secrets:
      SLACK_WEBHOOK_URL:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Update task definition and deploy
        id: deploy
        env:
          AWS_REGION: ${{ inputs.aws-region }}
          TASK_FAMILY: ${{ inputs.task-family }}
          ECS_CLUSTER: ${{ inputs.cluster }}
          ECS_SERVICE: ${{ inputs.service }}
          CONTAINER_NAME: ${{ inputs.container-name }}
          IMAGE_URI: ${{ inputs.image-uri }}
        run: |
          echo "Fetching current task definition: $TASK_FAMILY"
          CURRENT_TD=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" --region "$AWS_REGION")

          NEW_TD=$(echo "$CURRENT_TD" | jq \
            --arg IMAGE "$IMAGE_URI" \
            --arg CNAME "$CONTAINER_NAME" '
            .taskDefinition |
            .containerDefinitions |= map(
              if .name == $CNAME then .image = $IMAGE else . end
            ) |
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                .placementConstraints, .compatibilities, .registeredAt, .registeredBy)
          ')

          NEW_REV=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD" --region "$AWS_REGION" | \
            jq -r '.taskDefinition.revision')
          echo "Registered $TASK_FAMILY:$NEW_REV"
          echo "revision=$NEW_REV" >> "$GITHUB_OUTPUT"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$TASK_FAMILY:$NEW_REV" \
            --force-new-deployment \
            --region "$AWS_REGION" > /dev/null
          echo "Service updated. Waiting for stability..."

          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            if aws ecs wait services-stable \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --region "$AWS_REGION" 2>/dev/null; then
              echo "Service stable."
              break
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "::error::Service failed to stabilize after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "Retry $i/$MAX_RETRIES — waiting 30s..."
            sleep 30
          done

      - name: Validate deployed image
        env:
          AWS_REGION: ${{ inputs.aws-region }}
          ECS_CLUSTER: ${{ inputs.cluster }}
          ECS_SERVICE: ${{ inputs.service }}
          CONTAINER_NAME: ${{ inputs.container-name }}
          IMAGE_URI: ${{ inputs.image-uri }}
        run: |
          TASK_ARN=$(aws ecs list-tasks \
            --cluster "$ECS_CLUSTER" \
            --service-name "$ECS_SERVICE" \
            --desired-status RUNNING \
            --region "$AWS_REGION" \
            --query 'taskArns[0]' --output text)

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "::warning::No running task found — skipping image validation"
            exit 0
          fi

          ACTUAL=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
            --region "$AWS_REGION" \
            --query "tasks[0].containers[?name=='$CONTAINER_NAME'].image | [0]" \
            --output text)

          if [ "$ACTUAL" != "$IMAGE_URI" ]; then
            echo "::warning::Image mismatch: expected $IMAGE_URI, got $ACTUAL"
          else
            echo "Validated: $IMAGE_URI is running."
          fi

      - name: Cleanup stale task definition revisions
        env:
          AWS_REGION: ${{ inputs.aws-region }}
          TASK_FAMILY: ${{ inputs.task-family }}
        run: |
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" --region "$AWS_REGION" | \
            jq -r '.taskDefinition.revision')
          PREVIOUS=$(aws ecs list-task-definitions \
            --family-prefix "$TASK_FAMILY" --region "$AWS_REGION" | \
            jq -r '.taskDefinitionArns[]' | grep -v ":${CURRENT}$")
          for rev in $PREVIOUS; do
            echo "Deregistering $rev"
            aws ecs deregister-task-definition \
              --task-definition "$rev" --region "$AWS_REGION" > /dev/null || true
          done

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SERVICE: ${{ inputs.service }}
          STATUS: ${{ job.status }}
          IMAGE: ${{ inputs.image-uri }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$SLACK_WEBHOOK" ] && { echo "No Slack webhook configured, skipping."; exit 0; }
          if [ "$STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
            TEXT="$EMOJI *$SERVICE* deployed successfully"
          else
            EMOJI=":x:"
            TEXT="$EMOJI *$SERVICE* deploy *FAILED*"
          fi
          curl -sf -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"$TEXT\n> Image: \`$IMAGE\`\n> <$RUN_URL|View run>\"}" || true
