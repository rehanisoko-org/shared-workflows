name: ECS Service Deploy (Reusable)

on:
  workflow_call:
    inputs:
      image-uri:
        description: Full ECR image URI to deploy
        type: string
        required: true
      task-family:
        description: ECS task definition family name
        type: string
        required: true
      cluster:
        description: ECS cluster name
        type: string
        required: true
      service:
        description: ECS service name
        type: string
        required: true
      container-name:
        description: Container name in task definition to update
        type: string
        required: true
      wait-for-stability:
        description: Wait for ECS service to stabilize (set false for workers/celery)
        type: boolean
        required: false
        default: true
      aws-region:
        description: AWS region
        type: string
        required: false
        default: us-east-2
    secrets:
      SLACK_WEBHOOK_URL:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Update task definition and deploy
        id: deploy
        env:
          AWS_REGION: ${{ inputs.aws-region }}
          TASK_FAMILY: ${{ inputs.task-family }}
          ECS_CLUSTER: ${{ inputs.cluster }}
          ECS_SERVICE: ${{ inputs.service }}
          CONTAINER_NAME: ${{ inputs.container-name }}
          IMAGE_URI: ${{ inputs.image-uri }}
          WAIT: ${{ inputs.wait-for-stability }}
        run: |
          echo "Fetching current task definition: $TASK_FAMILY"
          CURRENT_TD=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" --region "$AWS_REGION")

          NEW_TD=$(echo "$CURRENT_TD" | jq \
            --arg IMAGE "$IMAGE_URI" \
            --arg CNAME "$CONTAINER_NAME" '
            .taskDefinition |
            .containerDefinitions |= map(
              if .name == $CNAME then .image = $IMAGE else . end
            ) |
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                .placementConstraints, .compatibilities, .registeredAt, .registeredBy)
          ')

          NEW_REV=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TD" --region "$AWS_REGION" | \
            jq -r '.taskDefinition.revision')
          echo "Registered $TASK_FAMILY:$NEW_REV"
          echo "revision=$NEW_REV" >> "$GITHUB_OUTPUT"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$TASK_FAMILY:$NEW_REV" \
            --force-new-deployment \
            --region "$AWS_REGION" > /dev/null

          if [ "$WAIT" = "true" ]; then
            echo "Waiting for service to stabilize..."
            if ! aws ecs wait services-stable \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --region "$AWS_REGION" 2>/dev/null; then
              echo "::warning::Service did not stabilize within timeout — check ECS console"
            else
              echo "Service stable."
            fi
          else
            echo "Skipping stability wait (wait-for-stability=false)."
            sleep 10
            RUNNING=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
              --region "$AWS_REGION" \
              --query 'services[0].deployments[?status==`PRIMARY`].runningCount | [0]' --output text)
            echo "Primary deployment running count: $RUNNING"
          fi

      - name: Cleanup stale task definition revisions
        env:
          AWS_REGION: ${{ inputs.aws-region }}
          TASK_FAMILY: ${{ inputs.task-family }}
        run: |
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" --region "$AWS_REGION" | \
            jq -r '.taskDefinition.revision')
          PREVIOUS=$(aws ecs list-task-definitions \
            --family-prefix "$TASK_FAMILY" --region "$AWS_REGION" | \
            jq -r '.taskDefinitionArns[]' | grep -v ":${CURRENT}$")
          for rev in $PREVIOUS; do
            echo "Deregistering $rev"
            aws ecs deregister-task-definition \
              --task-definition "$rev" --region "$AWS_REGION" > /dev/null || true
          done

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SERVICE: ${{ inputs.service }}
          STATUS: ${{ job.status }}
          IMAGE: ${{ inputs.image-uri }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$SLACK_WEBHOOK" ] && { echo "No Slack webhook configured, skipping."; exit 0; }
          if [ "$STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
            TEXT="$EMOJI *$SERVICE* deployed successfully"
          else
            EMOJI=":x:"
            TEXT="$EMOJI *$SERVICE* deploy *FAILED*"
          fi
          curl -sf -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"$TEXT\n> Image: \`$IMAGE\`\n> <$RUN_URL|View run>\"}" || true
