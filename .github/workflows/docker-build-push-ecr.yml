name: Docker Build & Push to ECR (Reusable)

on:
  workflow_call:
    inputs:
      ecr-repository:
        description: ECR repository name (without registry prefix)
        type: string
        required: true
      image-tag:
        description: Docker image tag (defaults to commit SHA)
        type: string
        required: false
        default: ''
      dockerfile:
        description: Path to Dockerfile
        type: string
        required: false
        default: Dockerfile
      context:
        description: Docker build context
        type: string
        required: false
        default: .
      build-args:
        description: Docker build args (newline-separated KEY=VALUE)
        type: string
        required: false
        default: ''
      aws-region:
        description: AWS region
        type: string
        required: false
        default: us-east-2
      aws-account-id:
        description: AWS account ID
        type: string
        required: false
        default: '561513845508'
    secrets:
      env-file-content:
        description: Contents to write to .env before building (optional)
        required: false
    outputs:
      image-uri:
        description: Full image URI pushed to ECR
        value: ${{ jobs.build.outputs.image-uri }}
      image-tag:
        description: The tag used for the pushed image
        value: ${{ jobs.build.outputs.image-tag }}

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.meta.outputs.image-uri }}
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ inputs.image-tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_SHA::8}"; fi
          REGISTRY="${{ inputs.aws-account-id }}.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com"
          IMAGE_URI="$REGISTRY/${{ inputs.ecr-repository }}:$TAG"
          echo "image-tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image-uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ inputs.aws-account-id }}

      - name: Write .env file
        run: |
          [ -z "$ENV_CONTENT" ] && { echo "No env-file-content provided, skipping."; exit 0; }
          printf '%s\n' "$ENV_CONTENT" > .env
        env:
          ENV_CONTENT: ${{ secrets.env-file-content }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image-uri }}
            ${{ steps.meta.outputs.registry }}/${{ inputs.ecr-repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ inputs.build-args }}
          provenance: false
