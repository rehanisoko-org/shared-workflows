name: AWS OIDC Authentication (Reusable)

on:
  workflow_call:
    inputs:
      aws-region:
        description: AWS region to authenticate against
        type: string
        default: us-east-2
      role-to-assume:
        description: IAM role ARN to assume (defaults to org OIDC role)
        type: string
        required: false
    outputs:
      aws-account-id:
        description: The authenticated AWS account ID
        value: ${{ jobs.auth.outputs.aws-account-id }}

permissions:
  id-token: write
  contents: read

jobs:
  auth:
    runs-on: ubuntu-latest
    outputs:
      aws-account-id: ${{ steps.auth.outputs.aws-account-id }}
    steps:
      - name: Configure AWS credentials via OIDC
        id: auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume || vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region || vars.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.repository_id }}-${{ github.run_id }}
